version: '3.8'

# 完整版docker-compose配置（包含数据库和Redis容器）
# 适合：全新部署，需要独立的数据库和Redis实例
# 使用方法：docker-compose -f docker-compose.full.yml up -d

services:
  # MySQL数据库（MySQL 8.0）
  mysql:
    image: mysql:8.0
    container_name: ai-creator-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_creator}
      MYSQL_USER: ${MYSQL_USER:-ai_creator}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_creator123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-creator-network
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: ai-creator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-creator-network
    restart: unless-stopped

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-creator-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-ai_creator}:${MYSQL_PASSWORD:-ai_creator123}@mysql:3306/${MYSQL_DATABASE:-ai_creator}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123456}@redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-creator-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # 前端Nginx服务
  frontend-nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx
    container_name: ai-creator-frontend
    ports:
      - "8080:80"  # 外部端口8080 → 容器端口80
    depends_on:
      - backend
    networks:
      - ai-creator-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  ai-creator-network:
    driver: bridge
